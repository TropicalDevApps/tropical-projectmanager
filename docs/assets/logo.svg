<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient (Dark Terminal) -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e" />
      <stop offset="100%" stop-color="#2a2a40" />
    </linearGradient>

    <!-- Tropical Retro Sun Gradient -->
    <linearGradient id="sun-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f38ba8" />
      <stop offset="40%" stop-color="#ffb86c" />
      <stop offset="100%" stop-color="#f9e2af" />
    </linearGradient>

    <!-- Code Folder Gradient -->
    <linearGradient id="folder-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#89b4fa" />
      <stop offset="100%" stop-color="#cba6f7" />
    </linearGradient>

    <!-- Glow Effect for the Sun -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Terminal Window Background -->
  <rect x="20" y="40" width="360" height="320" rx="24" fill="url(#bg-gradient)" stroke="#45475a" stroke-width="4"/>

  <!-- Terminal Header Bar -->
  <path d="M 20 64 Q 20 40 44 40 L 356 40 Q 380 40 380 64 L 380 80 L 20 80 Z" fill="#313244" />

  <!-- Terminal Window Buttons (Mac style) -->
  <circle cx="50" cy="60" r="6" fill="#f38ba8" />
  <circle cx="75" cy="60" r="6" fill="#f9e2af" />
  <circle cx="100" cy="60" r="6" fill="#a6e3a1" />

  <!-- Tropical Sun with Glow -->
  <circle cx="200" cy="180" r="80" fill="url(#sun-gradient)" filter="url(#glow)"/>

  <!-- Sun retro horizontal stripes (Synthwave aesthetic) -->
  <rect x="110" y="210" width="180" height="5" fill="#1e1e2e" />
  <rect x="110" y="222" width="180" height="7" fill="#1e1e2e" />
  <rect x="110" y="238" width="180" height="10" fill="#1e1e2e" />
  <rect x="110" y="258" width="180" height="14" fill="#1e1e2e" />

  <!-- Stylized Neon Project Folder -->
  <path d="M 110 280 L 150 280 L 170 250 L 290 250 Q 300 250 300 260 L 300 320 Q 300 330 290 330 L 110 330 Q 100 330 100 320 L 100 260 Q 100 250 110 250 Z"
        fill="none" stroke="url(#folder-gradient)" stroke-width="12" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Code Brackets inside the Folder -->
  <path d="M 160 290 L 140 305 L 160 320" fill="none" stroke="#a6e3a1" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 240 290 L 260 305 L 240 320" fill="none" stroke="#f38ba8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 190 325 L 210 285" fill="none" stroke="#f9e2af" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />

</svg>
